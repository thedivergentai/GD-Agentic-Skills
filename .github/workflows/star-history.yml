name: Star History

on:
  schedule:
    # Daily ~06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-star-history
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate star history
        env:
          # Prefer the Actions job token (works for public stargazer lists).
          # Optional STAR_HISTORY_TOKEN is fallback only — do not override GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAR_HISTORY_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_star_history.py --out-dir site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
