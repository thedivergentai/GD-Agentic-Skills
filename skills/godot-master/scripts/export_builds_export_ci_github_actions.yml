name: Godot Expert Export CI
on: [push, pull_request]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Godot Build
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          export_debug: false
          export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          verbose: true
          # Note: Presets must match export_presets.cfg

      - name: Archive Production Build
        uses: actions/upload-artifact@v4
        with:
          name: game-builds
          path: build/
